[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200
monitor_filters = esp32_exception_decoder

build_flags = 
    -DCORE_DEBUG_LEVEL=3
    -DFIAPHY_DEBUG

lib_deps = 
    adafruit/Adafruit BME280 Library @ ^2.2.2
    bblanchon/ArduinoJson @ ^6.21.3

upload_speed = 921600
